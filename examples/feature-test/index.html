<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/logo-banner.svg">
  <title>Like2D - Demo</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #222;
      color: #fff;
      font-family: sans-serif;
      gap: 30px;
    }
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
      width: 800px;
      height: 600px;
      border: 2px solid #666;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #4CAF50;
      color: white;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <button id="fullscreen-btn">Fullscreen</button>
    <div id="game-container"></div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
