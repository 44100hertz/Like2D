<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Like2D Game</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: #222;
      color: #fff;
      font-family: sans-serif;
    }
    #fullscreen-btn {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
    }
    #fullscreen-btn:hover {
      background: #45a049;
    }
    #game-container {
      width: 800px;
      height: 600px;
    }
  </style>
</head>
<body>
  <button id="fullscreen-btn">Fullscreen</button>
  <div id="game-container"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
